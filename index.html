<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sustav Prijava - Germania</title>

    <style>
      :root {
        --bg-yellow: #fee000;
        --text-brown: #5c5300;
        --accent-red: #df1f26;
        --btn-green: #008237;
        --page-bg: #f0f0f0;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--page-bg);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .login-box {
        background-color: white;
        width: 100%;
        max-width: 340px;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
        border-top: 6px solid var(--accent-red);
      }

      .login-box img {
        height: 35px;
        margin-bottom: 25px;
      }

      .login-box h2 {
        color: var(--text-brown);
        font-size: 18px;
        margin-bottom: 20px;
        text-transform: uppercase;
      }

      /* PASSWORD INPUT WRAPPER */
      .input-wrapper {
        position: relative;
        width: 100%;
        margin-bottom: 15px;
      }

      .login-box input[type="password"],
      .login-box input[type="text"] {
        width: 100%;
        padding: 14px;
        padding-right: 45px; /* Prostor za oko */
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 16px;
        box-sizing: border-box;
        outline: none;
        transition: border-color 0.3s;
        text-align: center;
      }

      .login-box input:focus {
        border-color: var(--accent-red);
      }

      /* EYE ICON */
      .eye-icon {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        width: 20px;
        height: 20px;
        cursor: pointer;
        color: #777;
        transition: color 0.2s;
      }

      .eye-icon:hover {
        color: var(--accent-red);
      }

      /* REMEMBER ME TOGGLE */
      .remember-me {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        margin-bottom: 20px;
        font-size: 14px;
        color: var(--text-brown);
        cursor: pointer;
      }

      .remember-me input {
        margin-right: 8px;
        cursor: pointer;
        width: 16px;
        height: 16px;
        accent-color: var(--accent-red);
      }

      .login-box button {
        width: 100%;
        background-color: var(--btn-green);
        color: white;
        border: none;
        padding: 15px;
        font-size: 16px;
        font-weight: 700;
        border-radius: 8px;
        cursor: pointer;
        text-transform: uppercase;
        transition: opacity 0.2s;
      }

      .login-box button:hover {
        opacity: 0.9;
      }

      #message {
        margin-top: 15px;
        font-size: 14px;
        font-weight: bold;
        min-height: 20px;
      }

      /* SPINNER CSS */
      #spinnerBox {
        display: none; /* Skriveno po defaultu */
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-top: 10px;
        margin-bottom: 20px;
      }

      .spinner {
        width: 30px;
        height: 30px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid var(--accent-red);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      #spinnerBox p {
        color: var(--text-brown);
        font-size: 14px;
        font-weight: bold;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <img
        src="https://cdn.germaniasport.hr/public/img2023/mobile_logo.svg"
        alt="Germania Logo"
      />
      <h2>Sigurnosna Prijava</h2>

      <!-- LOCAL STORAGE AUTOLOGIN SPINNER -->
      <div id="spinnerBox">
        <div class="spinner"></div>
        <p>Provjera prethodne prijave...</p>
      </div>

      <!-- MAIN LOGIN FORM -->
      <div id="loginForm">
        <div class="input-wrapper">
          <input
            type="password"
            id="accessKey"
            placeholder="Unesite pristupni ključ..."
          />
          <!-- EYE ICON (SVG) -->
          <svg
            id="eyeIcon"
            class="eye-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </div>

        <label class="remember-me">
          <input type="checkbox" id="rememberMe" />
          Zapamti moju prijavu
        </label>

        <button id="enterBtn">Prijava</button>
      </div>

      <p id="message"></p>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
