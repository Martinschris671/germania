<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sustav Prijava - Germania</title>

    <style>
      /* Using the exact styles from your app */
      :root {
        --bg-yellow: #fee000;
        --text-brown: #5c5300;
        --accent-red: #df1f26;
        --btn-green: #008237;
        --page-bg: #f0f0f0;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--page-bg);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      /* The secure login box */
      .login-box {
        background-color: white;
        width: 100%;
        max-width: 340px;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
        border-top: 6px solid var(--accent-red);
      }

      /* The Germania Logo */
      .login-box img {
        height: 35px;
        margin-bottom: 25px;
      }

      .login-box h2 {
        color: var(--text-brown);
        font-size: 18px;
        margin-bottom: 20px;
        text-transform: uppercase;
      }

      /* The single Access Key input */
      .login-box input {
        width: 100%;
        padding: 14px;
        margin-bottom: 20px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 16px;
        box-sizing: border-box;
        outline: none;
        transition: border-color 0.3s;
        text-align: center;
      }

      .login-box input:focus {
        border-color: var(--accent-red);
      }

      /* The Login Button */
      .login-box button {
        width: 100%;
        background-color: var(--btn-green);
        color: white;
        border: none;
        padding: 15px;
        font-size: 16px;
        font-weight: 700;
        border-radius: 8px;
        cursor: pointer;
        text-transform: uppercase;
        transition: opacity 0.2s;
      }

      .login-box button:hover {
        opacity: 0.9;
      }

      /* Error/Success Message */
      #message {
        margin-top: 15px;
        font-size: 14px;
        font-weight: bold;
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <!-- Exact logo from your code -->
      <img
        src="https://cdn.germaniasport.hr/public/img2023/mobile_logo.svg"
        alt="Germania Logo"
      />

      <h2>Sigurnosna Prijava</h2>

      <!-- ONE BOX -->
      <input
        type="password"
        id="accessKey"
        placeholder="Unesite pristupni ključ..."
      />

      <button id="enterBtn">Prijava</button>

      <p id="message"></p>
    </div>

    <!-- Connects to the secure Firebase logic -->
    <script type="module" src="app.js"></script>
  </body>
</html>
